<div class="mb-3">
    <label class="form-label">{filter.title}</label>
    <f:for each="{filter.parsedTags}" as="tag">
        <div class="form-check">
            <f:form.checkbox
                id="seal_tag_{filter.uid}_{tag.value}"
                name="field_{filter.uid}"
                value="{tag.value}"
                checked="{tag.selected}"
                class="form-check-input"
                multiple="1"
            />
            <label class="form-check-label" for="seal_tag_{filter.uid}_{tag.value}">
                {tag.label} <f:if condition="{tag.count}">({tag.count})</f:if>
            </label>
        </div>
    </f:for>
</div>
